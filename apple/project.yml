# XcodeGen spec for the Sleep Tracker monorepo.
#
#   $ brew install xcodegen
#   $ cd apple && xcodegen generate
#   $ open SleepTracker.xcworkspace
#
# The generated workspace bundles:
#   * SleepTracker.xcodeproj  (iOS app + watchOS app)
#   * SleepKit                (local Swift Package, edited in place)
#
# Bundle identifiers use BASE_BUNDLE_ID (default com.example.sleep). Override
# from the shell before generation, e.g.:
#   $ BASE_BUNDLE_ID=dev.yourteam.sleep xcodegen generate

name: SleepTracker

# Project-level xcconfig that propagates BASE_BUNDLE_ID, DEVELOPMENT_TEAM,
# MARKETING_VERSION, and CURRENT_PROJECT_VERSION. Per-developer overrides
# can drop a Local.xcconfig next to Shared.xcconfig (gitignored).
configFiles:
  Debug: Configs/Shared.xcconfig
  Release: Configs/Shared.xcconfig

options:
  bundleIdPrefix: com.example.sleep
  createIntermediateGroups: true
  generateEmptyDirectories: false
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # MARKETING_VERSION / CURRENT_PROJECT_VERSION come from Shared.xcconfig
    # so a single source of truth survives regeneration.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""

packages:
  SleepKit:
    path: SleepKit
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 2.31.3

targets:

  # ---------- iOS app ----------
  SleepTracker-iOS:
    type: application
    platform: iOS
    sources:
      - path: SleepTracker-iOS
        excludes:
          - "**/.DS_Store"
          - "Resources/Info.plist"
          - "Resources/SleepTracker.entitlements"
    resources:
      - path: SleepTracker-iOS/Resources
        excludes:
          - "Info.plist"
          - "SleepTracker.entitlements"
        optional: true
    dependencies:
      - package: SleepKit
        product: SleepKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - target: SleepTracker-Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BASE_BUNDLE_ID).ios
        INFOPLIST_FILE: SleepTracker-iOS/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SleepTracker-iOS/Resources/SleepTracker.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postCompileScripts:
      - name: Embed Circadia LLM
        # Copies the fused LoRA-tuned weights for every model tier we ship
        # (Gemma overseas + Qwen Instant/Pro for China) into the .app bundle
        # so Sleep AI runs fully offline with no first-launch download.
        # Source dirs are produced by:
        #     PYTHONPATH=python python3 -m training.llm.fuse --tier <kind>
        # Missing tiers are skipped with a warning so a fresh clone still
        # builds — the developer can train + fuse and rebuild.
        script: |
          set -euo pipefail
          embed() {
            local SRC_NAME="$1"; local DST_NAME="$2"
            local SRC="${SRCROOT}/../python/training/llm/${SRC_NAME}"
            local DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/${DST_NAME}"
            if [ ! -d "${SRC}" ]; then
              echo "warning: Circadia LLM weights not found at ${SRC}; skipping ${DST_NAME}. Run 'PYTHONPATH=python python3 -m training.llm.fuse' for that tier."
              return 0
            fi
            mkdir -p "${DST}"
            rsync -a --delete "${SRC}/" "${DST}/"
            echo "Embedded ${DST_NAME} (size: $(du -sh \"${DST}\" | cut -f1))"
          }
          embed "fused-circadia-sleep"          "circadia-sleep-2b-4bit"
          embed "fused-circadia-sleep-qwen-1_7b" "circadia-sleep-qwen-1_7b-4bit"
          embed "fused-circadia-sleep-qwen-4b"   "circadia-sleep-qwen-4b-4bit"
        basedOnDependencyAnalysis: false
        showEnvVars: false
    scheme:
      testTargets:
        - SleepTracker-iOSTests
      gatherCoverageData: false

  # ---------- iOS app-target unit tests (M6.7) ----------
  SleepTracker-iOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SleepTracker-iOSTests
    dependencies:
      - target: SleepTracker-iOS
      - package: SleepKit
        product: SleepKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BASE_BUNDLE_ID).ios.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SleepTracker-iOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SleepTracker-iOS
        CODE_SIGNING_ALLOWED: NO

  # ---------- watchOS app (single-target, watchOS 10+) ----------
  SleepTracker-Watch:
    type: application
    platform: watchOS
    sources:
      - path: SleepTracker-Watch
        excludes:
          - "**/.DS_Store"
          - "Resources/Info.plist"
    resources:
      - path: SleepTracker-Watch/Resources
        excludes:
          - "Info.plist"
        optional: true
    dependencies:
      - package: SleepKit
        product: SleepKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BASE_BUNDLE_ID).ios.watchkitapp
        INFOPLIST_FILE: SleepTracker-Watch/Resources/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      gatherCoverageData: false

schemes:
  SleepTracker:
    build:
      targets:
        SleepTracker-iOS: all
        SleepTracker-Watch: all
    run:
      config: Debug
      executable: SleepTracker-iOS
